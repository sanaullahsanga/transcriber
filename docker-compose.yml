services:
  postgres:
    image: postgres:16-alpine
    container_name: transcriber-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: transcriber
      POSTGRES_PASSWORD: transcriber
      POSTGRES_DB: transcriber
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
