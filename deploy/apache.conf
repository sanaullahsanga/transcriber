# /etc/apache2/sites-available/transcriber.sangahub.com.conf
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http headers ssl
#   sudo a2ensite transcriber.sangahub.com.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# SSL (after DNS points to this server):
#   sudo certbot --apache -d transcriber.sangahub.com
#
# IMPORTANT: ProxyPass port must match PORT in /var/www/transcriber/.env

<VirtualHost *:80>
    ServerName transcriber.sangahub.com

    # 100 MB upload limit
    LimitRequestBody 104857600

    ProxyPreserveHost On
    ProxyTimeout 600

    # Change 3030 if your .env PORT is different
    ProxyPass / http://127.0.0.1:3030/
    ProxyPassReverse / http://127.0.0.1:3030/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/transcriber-error.log
    CustomLog ${APACHE_LOG_DIR}/transcriber-access.log combined
</VirtualHost>

# After certbot, a similar *:443 VirtualHost will be added automatically.
# If configuring SSL manually, also set:
#   RequestHeader set X-Forwarded-Proto "https"
#   RequestHeader set X-Forwarded-Port "443"
