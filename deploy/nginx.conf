# /etc/nginx/sites-available/transcriber.sangahub.com
#
# Enable:
#   sudo ln -s /etc/nginx/sites-available/transcriber.sangahub.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS points to this server):
#   sudo certbot --nginx -d transcriber.sangahub.com

server {
    listen 80;
    server_name transcriber.sangahub.com;

    client_max_body_size 100M;

    location / {
        # Must match PORT in .env
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
